# d9 — Docker Compose
# Usage: docker compose up -d
#
# Default credentials:
#   d9 Admin:  admin@example.com / d9-admin-password
#   Postgres:  d9 / d9
#   Redis:     no auth
#
# Override any variable via a .env file in the same directory.

services:
  d9:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${D9_PORT:-8055}:8055"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # --- Required secrets ---
      KEY: "${DIRECTUS_KEY:-d9-unique-identifier-key}"
      SECRET: "${DIRECTUS_SECRET:-change-me-to-a-random-value}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-d9-admin-password}"

      # --- Database ---
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-d9}"
      DB_USER: "${DB_USER:-d9}"
      DB_PASSWORD: "${DB_PASSWORD:-d9}"

      # --- Cache (Redis) ---
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      CACHE_REDIS: "redis://redis:6379"

      # --- Storage ---
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_ROOT: /directus/uploads

      # --- Misc ---
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8055}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - d9-uploads:/directus/uploads
      - d9-extensions:/directus/extensions
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${DB_DATABASE:-d9}"
      POSTGRES_USER: "${DB_USER:-d9}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-d9}"
    volumes:
      - d9-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-d9} -d ${DB_DATABASE:-d9}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - d9-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  d9-db:
  d9-redis:
  d9-uploads:
  d9-extensions:
